aid: concord-com
url: https://raw.githubusercontent.com/api-evangelist/concord-com/refs/heads/main/apis.yml
name: Concord
kind: company
description: Concord is a contract lifecycle management (CLM) platform for creating,
  negotiating, redlining, e-signing, storing, and tracking agreements in one place,
  with unlimited electronic signatures, automated templates, approval workflows, and
  reporting. Concord exposes a documented REST API (base
  https://api.concordnow.com/api/rest/1) that lets integrators read a user's
  organizations, list and retrieve agreements and their attachments and members,
  and pull organization reports, groups, and tags. Outbound webhooks notify external
  systems of agreement lifecycle events (fully approved, fully signed, expired,
  signature provided). API key generation is offered on paid plans only.

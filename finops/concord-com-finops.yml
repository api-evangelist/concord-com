description: >-
  FinOps view of Concord spend. Concord is a per-seat SaaS contract lifecycle
  management subscription billed annually, with all plans including unlimited
  electronic signatures and no per-document fees. Cost is driven primarily by
  the plan tier (Essentials, Business, Enterprise) and the number of seats above
  each plan's included allotment, rather than by API call volume - the REST API
  carries no separate metered fee and is included on paid plans. Because billing
  is seat-based and annual, the dominant FinOps levers are right-sizing the seat
  count and choosing the tier that matches required features (workflows,
  reporting, SSO), not per-request optimization.
notes: >-
  Per-seat rates and included-seat counts vary by source and negotiation and are
  not reconciled here; verify on the Concord pricing page during reconciliation.
  There is no usage-metered API charge, so API cost allocation is effectively a
  share of the seat-based subscription.

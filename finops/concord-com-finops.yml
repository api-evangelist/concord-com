meters:
- name: base_subscription
  description: Flat annual base subscription for the chosen plan tier, including a bundled seat allotment.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: additional_seats
  description: Per-user seats beyond the plan's included allotment, billed per seat per month.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track active seats against the plan's included allotment and the annual contract value; the API itself is unmetered.
- name: Allocation
  description: Map seats and the subscription to the teams and legal/procurement functions that use Concord.
- name: Optimization
  description: Right-size seat counts and pick the tier whose bundled features (workflows, reporting, SSO) match need, since spend is seat- and tier-driven, not API-call-driven.
- name: Accountability
  description: Assign an owner to review seat utilization and renewal terms ahead of the annual billing cycle.
